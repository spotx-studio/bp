<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廷家單身之夜 - 終極挑戰</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Apple Web Dark Mode Colors */
    --bg-color: #000000;
    --surface-primary: rgba(29, 29, 31, 0.72);
    --surface-secondary: #1D1D1F;
    --surface-tertiary: #333336;
    --text-primary: #F5F5F7;
    --text-secondary: #86868B;
    --text-tertiary: #6E6E73;
    --accent-blue: #2997FF;
    --accent-blue-hover: #147CE5;
    --accent-red: #FF3B30;
    --accent-green: #30D158;
    --border-color: rgba(255, 255, 255, 0.1);
    
    font-family: "SF Pro Display", "SF Pro Text", "Inter", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg-color);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.015em;
  }

  /* Typography / Header */
  header {
    width: 100%;
    padding: 60px 20px 30px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-blue);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1.1;
    background: linear-gradient(180deg, #FFFFFF 0%, #A1A1A6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Stats Bar - Apple Web Minimalist Style */
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 0 20px 30px;
    width: 100%;
    max-width: 440px;
    justify-content: space-between;
  }

  .stat-card {
    flex: 1;
    background: var(--surface-primary);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    border-radius: 18px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; letter-spacing: 0.02em; }
  .stat-value { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  
  .drink-dots { display: flex; gap: 8px; }
  .drink-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--surface-tertiary);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .drink-dot.used { 
    background: var(--accent-red);
    box-shadow: 0 0 10px rgba(255, 59, 48, 0.4);
  }

  /* Main Area */
  .main-container {
    width: 100%;
    max-width: 440px;
    padding: 0 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Progress */
  .progress-container { width: 100%; margin-bottom: 30px; }
  .progress-track {
    height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--text-primary); transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); border-radius: 2px;
  }

  /* Cards Setup - Apple Web Premium Design */
  .card-scene {
    width: 320px;
    height: 480px;
    perspective: 1500px;
    margin-bottom: 40px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }
  .card:hover:not(.flipped) { transform: scale(1.02); transition: transform 0.3s ease; }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  /* Card Back - Deep Metallic Mesh */
  .card-back {
    background: radial-gradient(circle at 50% 0%, #333336 0%, #111112 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    align-items: center;
    justify-content: center;
  }
  .card-back::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 16px 16px; opacity: 0.3;
  }

.card-back-icon {
    width: 72px; height: 72px; fill: var(--text-secondary);
    opacity: 0.7; margin-bottom: 20px; z-index: 1;
    /* --- Safari 3D 穿透修復 --- */
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: translateZ(1px);
  }

 .card-back-text {
    font-size: 16px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.05em; z-index: 1;
    /* --- Safari 3D 穿透修復 --- */
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: translateZ(1px);
  }

  /* Card Front - Dark Aurora Blur */
  .card-front {
    background: #111112;
    transform: rotateY(180deg);
    padding: 32px 24px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .card-front::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 20%, rgba(41, 151, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 59, 48, 0.1) 0%, transparent 40%);
    z-index: 0; pointer-events: none; filter: blur(40px);
  }

.card-front-content-wrapper { 
    position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; 
    transition: filter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    /* --- Safari 3D 穿透修復 --- */
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: translateZ(1px);
  }

  /* 新增：隱藏狀態的 class，不帶 transition 確保換題時能瞬間隱藏 */
  .card-front-content-wrapper.concealed {
    filter: blur(20px);
    opacity: 0;
    transition: none; 
  }
  
  .c-category { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
  .c-title { font-size: 28px; font-weight: 700; margin-bottom: 20px; line-height: 1.2; letter-spacing: -0.02em; }
  .c-body { font-size: 17px; line-height: 1.6; color: var(--text-primary); flex: 1; font-weight: 400; }
  
  .c-fail {
    margin-top: 20px; padding: 16px; background: rgba(255, 255, 255, 0.05);
    border-radius: 16px; font-size: 14px; color: var(--text-secondary);
    border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
  }
  .c-fail strong { color: var(--text-primary); font-weight: 600; }

  /* Buttons - Pill Shaped */
  .btn-group { display: flex; flex-direction: column; gap: 16px; width: 100%; }
  
  .btn {
    width: 100%; padding: 18px; border-radius: 980px; border: 1px solid transparent;
    font-size: 17px; font-weight: 600; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    display: flex; justify-content: center; align-items: center; gap: 8px;
    letter-spacing: -0.01em;
  }
  .btn:active { transform: scale(0.97); }
  
  .btn-primary { background: var(--text-primary); color: var(--bg-color); }
  .btn-primary:hover { background: #FFFFFF; box-shadow: 0 4px 14px rgba(255,255,255,0.2); }
  
  .btn-danger { background: rgba(255, 59, 48, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 59, 48, 0.3); }
  .btn-danger:hover:not(:disabled) { background: rgba(255, 59, 48, 0.15); }
  .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .btn-outline { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); }
  .btn-outline:hover { background: rgba(255,255,255,0.05); }

  /* Chance Cards Area */
  .chance-area { width: 100%; display: none; flex-direction: column; align-items: center; }
  .chance-area.active { display: flex; animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
  
  .chance-header { text-align: center; margin-bottom: 30px; }
  .chance-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
  .chance-header p { font-size: 15px; color: var(--text-secondary); }

  .chance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; }
  
  .chance-card { height: 160px; perspective: 1000px; }
  .chance-card-inner {
    width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer;
  }
  .chance-card-inner.flipped { transform: rotateY(180deg); }
  .chance-card-inner:hover:not(.flipped) { transform: scale(1.05); }
  
  .chance-face {
    position: absolute; inset: 0; border-radius: 18px; backface-visibility: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 1px solid var(--border-color); padding: 12px; text-align: center;
  }
  
  .chance-back { background: var(--surface-secondary); }
  .chance-back svg { width: 32px; height: 32px; fill: var(--text-tertiary); }
  
  .chance-front { background: var(--surface-primary); transform: rotateY(180deg); backdrop-filter: blur(10px); }
  .chance-front.safe { border-color: rgba(48, 209, 88, 0.5); background: rgba(48, 209, 88, 0.05); }
  .chance-front.danger { border-color: rgba(255, 59, 48, 0.5); background: rgba(255, 59, 48, 0.05); }
  
  .chance-icon { width: 36px; height: 36px; margin-bottom: 12px; }
  .chance-front.safe .chance-icon { fill: var(--accent-green); }
  .chance-front.danger .chance-icon { fill: var(--accent-red); }
  
  .chance-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-primary); }
  .chance-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

  /* Screens */
  .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
  .screen.active { display: flex; animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
  @keyframes fadeSlideUp { 
    from { opacity: 0; transform: translateY(20px); } 
    to { opacity: 1; transform: translateY(0); } 
  }

  /* Intro */
  .rules-box {
    background: var(--surface-primary); padding: 30px; border-radius: 24px;
    margin-bottom: 40px; width: 100%; border: 1px solid var(--border-color);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .rules-box h3 { font-size: 18px; margin-bottom: 24px; font-weight: 600; letter-spacing: -0.01em; }
  .rules-box ul { list-style: none; display: flex; flex-direction: column; gap: 20px; }
  .rules-box li { display: flex; align-items: flex-start; gap: 16px; font-size: 16px; color: var(--text-secondary); line-height: 1.5; }
  .rules-box li svg { width: 24px; height: 24px; fill: var(--text-primary); flex-shrink: 0; }

  /* Toast Notification */
  .toast {
    position: fixed; top: 40px; background: rgba(29, 29, 31, 0.8); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-color);
    padding: 14px 28px; border-radius: 980px; font-size: 15px; font-weight: 500;
    z-index: 1000; transform: translateY(-100px); opacity: 0; transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .hidden { display: none !important; }

  /* --- Safari 終極防穿透修復（物理消滅法） --- */
  /* 當卡牌翻轉時，在 0.15 秒（側對螢幕的瞬間）直接把背面變透明 */
  .card.flipped .card-back {
    opacity: 0;
    transition: opacity 0.1s 0.15s;
  }
  .card:not(.flipped) .card-back {
    opacity: 1;
    transition: opacity 0.1s 0.15s;
  }
  
  /* 順便為「機會卡」也加上一樣的防護，避免抽卡時也破功 */
  .chance-card-inner.flipped .chance-back {
    opacity: 0;
    transition: opacity 0.1s 0.15s;
  }
  .chance-card-inner:not(.flipped) .chance-back {
    opacity: 1;
    transition: opacity 0.1s 0.15s;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">The Ultimate Challenge</div>
  <h1>廷家單身之夜</h1>
</header>

<div class="stats-bar hidden" id="stats-bar">
  <div class="stat-card">
    <span class="stat-label">當前回合</span>
    <span class="stat-value" id="round-display">1 / 10</span>
  </div>
  <div class="stat-card">
    <span class="stat-label">Drink 配額</span>
    <div class="drink-dots">
      <div class="drink-dot" id="d1"></div>
      <div class="drink-dot" id="d2"></div>
      <div class="drink-dot" id="d3"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="main-container">

  <div class="screen active" id="screen-intro">
    <div class="rules-box">
      <h3>遊戲規則</h3>
      <ul>
        <li><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg><span>共有 10 題終極挑戰，循序漸進。</span></li>
        <li><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>選擇 <b>Do</b>：接受挑戰。失敗則執行小懲罰。</span></li>
        <li><svg viewBox="0 0 24 24"><path d="M21 3H3v18h18V3zm-2 16H5V5h14v14zm-8-2h2v-4h4v-2h-4V7h-2v4H7v2h4z"/></svg><span>選擇 <b>Drink</b>：拒絕挑戰並喝酒，但需額外抽機會卡。</span></li>
        <li><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span><b>Drink</b> 上限 3 次，不可連續使用，用盡即失去退路。</span></li>
      </ul>
    </div>
    <button class="btn btn-primary" onclick="startGame()">開始挑戰</button>
  </div>

  <div class="screen" id="screen-game">
    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
      </div>
    </div>

    <div id="card-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
      <div class="card-scene">
        <div class="card" id="main-card" onclick="flipCard()">
          <div class="card-face card-back">
            <svg class="card-back-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm4.6 6.82c-.89-.86-2.39-1.42-4.6-1.42s-3.71.56-4.6 1.42C6.24 18.06 5 16.67 5 15V5h14v10c0 1.67-1.24 3.06-2.4 3.82z"/></svg>
            <div class="card-back-text">點擊翻牌</div>
          </div>
          <div class="card-face card-front">
            <div class="card-front-content-wrapper" id="card-front-content"></div>
          </div>
        </div>
      </div>

      <div class="btn-group hidden" id="action-area">
        <button class="btn btn-primary" onclick="chooseDo()">接受挑戰 (Do)</button>
        <button class="btn btn-danger" id="btn-drink" onclick="chooseDrink()">喝一杯 (Drink)</button>
        <p id="drink-limit-msg" style="text-align: center; font-size: 13px; color: var(--accent-red); margin-top: -4px; display: none;">Drink 次數已達上限或無法連續使用</p>
      </div>

      <div class="btn-group hidden" id="next-area">
        <button class="btn btn-outline" style="border-color: var(--accent-green); color: var(--accent-green);" onclick="nextRound()">挑戰成功 (進入下一題)</button>
        <button class="btn btn-danger" onclick="triggerPunishment()">挑戰失敗 (執行小懲罰)</button>
      </div>
    </div>

    <div class="chance-area" id="chance-area">
      <div class="chance-header">
        <h2>機會卡</h2>
        <p>三選一，尋找唯一的安全牌</p>
      </div>
      <div class="chance-grid" id="chance-grid"></div>
      
      <div id="chance-result" class="hidden" style="margin-top: 30px; text-align: center; padding: 20px; background: var(--surface-primary); border-radius: 18px; width: 100%; border: 1px solid var(--border-color);">
        <div id="chance-result-text" style="font-size: 16px; line-height: 1.6;"></div>
      </div>
      
      <div class="btn-group hidden" id="btn-after-chance" style="margin-top: 30px;">
        <button class="btn btn-primary" onclick="afterChance()">繼續下一回合</button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-gameover">
    <svg viewBox="0 0 24 24" style="width: 80px; height: 80px; fill: var(--text-primary); margin: 40px 0 20px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <h2 style="font-size: 34px; margin-bottom: 12px; font-weight: 700; letter-spacing: -0.02em;">挑戰完成</h2>
    <p style="color: var(--text-secondary); margin-bottom: 40px; text-align: center; font-size: 16px;">這段瘋狂之旅結束了，進入最後分享環節吧。</p>
    
    <div style="background: var(--surface-primary); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; width: 100%; margin-bottom: 30px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px;">
        <span style="color: var(--text-secondary); font-size: 16px;">勇敢完成的挑戰數</span>
        <span style="font-weight: 600; font-size: 22px;" id="final-do-count">0</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span style="color: var(--text-secondary); font-size: 16px;">使用的 Drink 額度</span>
        <span style="font-weight: 600; font-size: 22px; color: var(--accent-red);" id="final-drink-count">0</span>
      </div>
    </div>
    
    <button class="btn btn-outline" onclick="location.reload()">重新開始</button>
  </div>

</div>

<script>
// ============ SVGs ============
const svgSafe = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;
const svgDanger = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`;
const svgCard = `<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>`;

const svgIcons = {
  ice: `<svg viewBox="0 0 24 24"><path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 004 20h14c3.31 0 6-2.69 6-6 0-3.22-2.53-5.84-5.64-5.96z"/></svg>`,
  lips: `<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
  drum: `<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`,

  muscle: `<svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43 1.43-1.43z"/></svg>`,
  water: `<svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8zm0 16c-3.14 0-6-2.07-6-6.2 0-2.3 2.03-5.5 6-9.28 3.97 3.78 6 6.98 6 9.28 0 4.13-2.86 6.2-6 6.2z"/></svg>`,
  pose: `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`,
  pen: `<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`
};

// ============ DATA ============
// 10 條進階版題目
const challenges = [
  { cat: "感官類", title: "冰火五重天", body: "含著一顆冰塊，並由弟兄用吹風機熱風對著臉吹，堅持 30 秒不准吐掉冰塊，期間還要對著鏡頭微笑。", fail: "執行小懲罰" },
  { cat: "體能恥度類", title: "人體腳踏車", body: "與現場一位弟兄在地上對躺，雙腳騰空互踩做「空中腳踏車」，高喊「我要當爸爸了！」持續 1 分鐘。", fail: "執行小懲罰" },
  { cat: "兄弟情誼", title: "盲人摸象", body: "蒙上眼睛，僅憑「摸小腿」或「摸手肘」，必須從現場弟兄中準確猜出哪一個是伴郎。", fail: "猜錯執行小懲罰" },
  { cat: "數位類", title: "Siri 告解", body: "對著手機 Siri 大聲喊出：「嘿 Siri，我真的很怕老婆，我該怎麼辦？」並播放回答給所有人聽。", fail: "無法啟動則執行小懲罰" },
  { cat: "味覺類", title: "辣味挑戰", body: "準備一個「加了過量芥末」的小點心，必須在 10 秒內吃完且不能流淚、不能喝水。", fail: "流淚或喝水執行小懲罰" },
  { cat: "肢體類", title: "氣球爆破大師", body: "與一位弟兄合力，不用手，僅靠身體（如胸對胸、背對背）擠破 3 顆氣球。", fail: "超時執行小懲罰" },
  { cat: "反應類", title: "婚後求生欲測驗", body: "伴郎快速讀出 5 個「送命題」，必須在 3 秒內給出滿意答覆，由弟兄投票決定。", fail: "沒過半數執行小懲罰" },
  { cat: "標記類", title: "人體畫布", body: "讓現場每位弟兄在你的手臂或背上，用彩色筆寫下一句「婚姻建言」或簽名。", fail: "拒絕即刻執行小懲罰" },
  { cat: "秀身材類", title: "猛男伸展台", body: "穿上指定的「極小號 T-shirt」或女性圍裙，繞場走秀並擺出三個健美 Pose。", fail: "扭捏不配合執行小懲罰" },
  { cat: "終極挑戰", title: "人體衝浪", body: "站在高處倒下，由所有弟兄在下方接住舉高，需對天高喊：「再見了！單身的生活！」", fail: "沒有退路！必須完成！" }
];

// 多元化小懲罰（減少單純脫衣，增加趣味互動）
const punishments = [
  { icon: svgIcons.ice, title: "冰塊洗禮", text: "在背上放一塊冰塊，任其滑動 10 秒不准叫出聲。" },
  { icon: svgIcons.lips, title: "愛的印記", text: "由弟兄用口紅在你的臉頰或胸口畫上一顆大大的愛心。" },
  { icon: svgIcons.dress, title: "羞恥裝扮", text: "戴上粉紅心形墨鏡與頭紗，維持造型進行下一關。" },
  { icon: svgIcons.face, title: "肚子畫臉", text: "掀起衣服，在肚子上畫笑臉並透過抖動肚子讓它說話。" },
  { icon: svgIcons.muscle, title: "猛男俯臥撐", text: "在現場弟兄圍觀下，一邊大喊愛老婆一邊完成 15 個俯臥撐。" },
  { icon: svgIcons.water, title: "汗流浹背", text: "由弟兄用噴水瓶瘋狂噴水，並拍下狼狽卻又性感的照片留念。" },
  { icon: svgIcons.pose, title: "健美先生", text: "脫掉上衣，擺出三個專業的健美 Pose，由弟兄嚴格評分。" },
  { icon: svgIcons.dress, title: "半裸圍裙", text: "穿上一件粉紅色的女性圍裙，並以這個造型進行遊戲。" },
  { icon: svgIcons.pen, title: "人體留言板", text: "貢獻你的手臂與後背，讓弟兄們用簽字筆盡情留下祝福與畫作。" }
];

// ============ STATE ============
let state = {
  deck: [],
  round: 0,
  drinkCount: 0,
  maxDrink: 3,
  lastWasDrink: false,
  cardFlipped: false,
  doCount: 0,
  drinkFinalCount: 0,
  chanceChosen: false,
  currentChanceCards: [] // 新增這行：用來記錄當下的機會卡狀態
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  state.deck = shuffle(challenges).slice(0, 10);
  state.round = 0;
  state.drinkCount = 0;
  state.doCount = 0;
  state.drinkFinalCount = 0;
  state.lastWasDrink = false;

  document.getElementById('stats-bar').classList.remove('hidden');
  switchScreen('screen-game');
  nextRound();
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateUI() {
  document.getElementById('round-display').textContent = `${state.round} / 10`;
  document.getElementById('progress-fill').style.width = `${((state.round - 1) / 10) * 100}%`;

  ['d1','d2','d3'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('used', i < state.drinkCount);
  });
}

function nextRound() {
  if (state.round >= 10) { showGameOver(); return; }

  state.round++;
  state.cardFlipped = false;
  updateUI();

  const contentWrapper = document.getElementById('card-front-content');
  
  // 1. 瞬間套用模糊與透明，確保在翻回去的過程中絕對看不到內容
  contentWrapper.classList.add('concealed');

  const c = state.deck[state.round - 1];
  contentWrapper.innerHTML = `
    <div class="c-category">${c.cat}</div>
    <div class="c-title">${c.title}</div>
    <div class="c-body">${c.body}</div>
    <div class="c-fail"><strong>失敗懲罰：</strong>${c.fail}</div>
  `;

  document.getElementById('card-area').classList.remove('hidden');
  document.getElementById('chance-area').classList.remove('active');
  document.getElementById('action-area').classList.add('hidden');
  document.getElementById('next-area').classList.add('hidden');
  
  // 2. 卡片開始翻回背面
  document.getElementById('main-card').classList.remove('flipped');
}

function flipCard() {
  if (state.cardFlipped) return;
  state.cardFlipped = true;
  document.getElementById('main-card').classList.add('flipped');

  // 新增：在卡片翻轉到一半時（約 300ms），解除模糊效果，創造 Apple 風格的優雅浮現感
  setTimeout(() => {
    document.getElementById('card-front-content').classList.remove('concealed');
  }, 300);

  setTimeout(() => {
    document.getElementById('action-area').classList.remove('hidden');
    
    // 第 10 題終極挑戰不准喝
    const isLastRound = (state.round === 10);
    const drinkDisabled = state.drinkCount >= state.maxDrink || state.lastWasDrink || isLastRound;
    
    document.getElementById('btn-drink').disabled = drinkDisabled;
    if (isLastRound) {
      document.getElementById('drink-limit-msg').textContent = "終極挑戰沒有退路！";
      document.getElementById('drink-limit-msg').style.display = 'block';
    } else {
      document.getElementById('drink-limit-msg').textContent = "Drink 次數已達上限或無法連續使用";
      document.getElementById('drink-limit-msg').style.display = drinkDisabled ? 'block' : 'none';
    }
  }, 500);
}

function chooseDo() {
  state.lastWasDrink = false;
  state.doCount++;
  document.getElementById('action-area').classList.add('hidden');
  document.getElementById('next-area').classList.remove('hidden');
  // 提示語改成請兄弟們評分
  showToast('請開始挑戰！弟兄們請嚴格評分！'); 
}

function triggerPunishment() {
  // 既然挑戰失敗了，就把剛剛「假定成功」加上的 doCount 扣除，讓結算畫面更真實
  if (state.doCount > 0) state.doCount--;
  
  // 隱藏卡牌區，呼叫抽卡介面
  document.getElementById('card-area').classList.add('hidden');
  setupChanceCards();
  showToast('挑戰失敗！請抽取你的命運');
}

function chooseDrink() {
  state.drinkCount++;
  state.drinkFinalCount++;
  state.lastWasDrink = true;
  updateUI();
  
  document.getElementById('card-area').classList.add('hidden');
  setupChanceCards();
}

function setupChanceCards() {
  state.chanceChosen = false;
  document.getElementById('chance-area').classList.add('active');
  document.getElementById('chance-result').classList.add('hidden');
  document.getElementById('btn-after-chance').classList.add('hidden');

  const p = shuffle(punishments);
  const cards = [
    { type: 'safe', icon: svgSafe, title: '安全過關', text: '躲過一劫' },
    { type: 'danger', icon: p[0].icon, title: p[0].title, text: p[0].text },
    { type: 'danger', icon: p[1].icon, title: p[1].title, text: p[1].text }
  ];

  const shufCards = shuffle(cards);
  state.currentChanceCards = shufCards; // 將洗好的卡牌存入 state

  const grid = document.getElementById('chance-grid');
  grid.innerHTML = '';

  shufCards.forEach((c, i) => {
    grid.innerHTML += `
      <div class="chance-card">
        <div class="chance-card-inner" id="chance-${i}" onclick="revealChance(${i})">
          <div class="chance-face chance-back">${svgCard}</div>
          <div class="chance-face chance-front ${c.type}">
            <div class="chance-icon">${c.icon}</div>
            <div class="chance-title">${c.title}</div>
            <div class="chance-desc">${c.text}</div>
          </div>
        </div>
      </div>
    `;
  });
}

function revealChance(idx) {
  if (state.chanceChosen) return;
  state.chanceChosen = true;

  // 從 state 中取出被點擊的卡片資料
  const card = state.currentChanceCards[idx];

  document.getElementById(`chance-${idx}`).classList.add('flipped');

  setTimeout(() => {
    // 翻開其他未選的牌
    for (let i = 0; i < 3; i++) {
      if (i !== idx) document.getElementById(`chance-${i}`).classList.add('flipped');
    }
    
    setTimeout(() => {
      const res = document.getElementById('chance-result');
      const resText = document.getElementById('chance-result-text');
      
      if (card.type === 'safe') {
        resText.innerHTML = `<span style="color:var(--accent-green);font-weight:600;font-size:18px;">運氣真好</span><br><br><span style="color:var(--text-secondary);">免除所有懲罰，繼續下一題！</span>`;
        showToast('幸運！安全過關');
      } else {
        resText.innerHTML = `<span style="color:var(--accent-red);font-weight:600;font-size:18px;">${card.title}</span><br><br><span style="color:var(--text-primary);">${card.text}</span>`;
        showToast('請執行指定懲罰');
      }
      
      res.classList.remove('hidden');
      document.getElementById('btn-after-chance').classList.remove('hidden');
    }, 600);
  }, 500);
}

function afterChance() {
  // 隱藏機會卡的結果區域
  document.getElementById('chance-result').classList.add('hidden');
  document.getElementById('btn-after-chance').classList.add('hidden');
  
  // 不再回到舊題目，直接呼叫進入下一回合
  nextRound();
  showToast('準備迎接下一題！');
}

function showGameOver() {
  document.getElementById('stats-bar').classList.add('hidden');
  document.getElementById('final-do-count').textContent = state.doCount;
  document.getElementById('final-drink-count').textContent = state.drinkFinalCount;
  switchScreen('screen-gameover');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
